<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost and Found Board</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="_sdk/data_sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mainUser.css">
</head>

<body class="h-full">
    <!-- Main app container for the Lost & Found board -->
    <div id="app" class="h-full overflow-auto">
        <header class="sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-16 h-16 rounded-xl flex items-center justify-center">
                            <img src="image/school logo.png" alt="School Logo" class="w-full h-full object-cover rounded-xl">
                        </div>
                        <div>
                            <h1 id="board-title" class="text-xl font-bold text-[#f8fafc]">Lost & Found Board</h1>
                            <p id="school-name" class="text-sm text-[#94a3b8]">Limay Senior High School</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="post-btn" onclick="togglePostPanel()" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all hover:scale-105 bg-[#22c55e] text-white">
                            <span>➕</span> <span class="hidden sm:inline">Post Item</span>
                        </button>
                        <button id="admin-btn" onclick="toggleAdminPanel()" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all hover:scale-105 bg-[#f59e0b] text-[#0f172a]">
                            <span>🔐</span> <span class="hidden sm:inline">Admin</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 py-6">
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="rounded-xl p-4 text-center bg-[#334155]">
                    <p id="total-count" class="text-2xl font-bold text-[#f59e0b]">0</p>
                    <p class="text-xs text-[#94a3b8]">Total Items</p>
                </div>
                <div class="rounded-xl p-4 text-center bg-[#334155]">
                    <p id="lost-count" class="text-2xl font-bold text-[#ef4444]">0</p>
                    <p class="text-xs text-[#94a3b8]">Lost</p>
                </div>
                <div class="rounded-xl p-4 text-center bg-[#334155]">
                    <p id="found-count" class="text-2xl font-bold text-[#22c55e]">0</p>
                    <p class="text-xs text-[#94a3b8]">Found</p>
                </div>
            </div>

            <!-- Search & Categorization Section -->
            <div class="mb-6 space-y-4">
                <!-- Search Input -->
                <div class="flex gap-4">
                    <div class="flex-1">
                        <input type="text" id="user-search" placeholder="Search by name, description, or location..." class="w-full px-4 py-3 rounded-lg bg-[#334155] border border-[#475569] text-[#f8fafc] placeholder-[#94a3b8] focus:outline-none focus:ring-2 focus:ring-[#f59e0b] focus:border-transparent">
                    </div>
                </div>
                
                <!-- Category Filters -->
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <button onclick="setCategory('all')" data-category="all" class="category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#f59e0b] text-[#0f172a]"> All Categories </button>
                    <button onclick="setCategory('Electronics')" data-category="Electronics" class="category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 📱 Electronics </button>
                    <button onclick="setCategory('Stationery')" data-category="Stationery" class="category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 📝 Stationery </button>
                    <button onclick="setCategory('Clothing')" data-category="Clothing" class="category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 👕 Clothing </button>
                    <button onclick="setCategory('Documents')" data-category="Documents" class="category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 📄 Documents </button>
                    <button onclick="setCategory('Other')" data-category="Other" class="category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 📦 Other </button>
                </div>
            </div>

            <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
                <button onclick="setFilter('all')" data-filter="all" class="filter-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#f59e0b] text-[#0f172a]"> All Items </button>
                <button onclick="setFilter('lost')" data-filter="lost" class="filter-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 🔴 Lost </button>
                <button onclick="setFilter('found')" data-filter="found" class="filter-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 🟢 Found </button>
                <button onclick="setFilter('claimed')" data-filter="claimed" class="filter-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> ✅ Claimed </button>
            </div>

            <div id="items-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>

            <div id="empty-state" class="hidden text-center py-16">
                <div class="text-6xl mb-4">📭</div>
                <h3 class="text-xl font-semibold mb-2 text-[#f8fafc]">No items yet</h3>
                <p class="text-[#94a3b8]">Post something to the board!</p>
            </div>

            <div id="loading-state" class="text-center py-16">
                <div class="inline-block w-8 h-8 border-4 rounded-full animate-spin border-[#f59e0b] border-t-transparent"></div>
                <p class="mt-4 text-[#94a3b8]">Loading items...</p>
            </div>
        </main>

        <div id="post-overlay" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/60" onclick="togglePostPanel()"></div>
            <div class="absolute right-0 top-0 h-full w-full max-w-md overflow-y-auto animate-slide panel-container">
                <div class="sticky top-0 p-4 border-b flex items-center justify-between panel-header">
                    <h2 class="text-lg font-bold text-[#f8fafc]">➕ Report Item</h2>
                    <button onclick="togglePostPanel()" class="w-8 h-8 rounded-lg flex items-center justify-center bg-[#334155] text-[#f8fafc]">✕</button>
                </div>
                <div class="p-4 space-y-4">
                    <form id="user-post-form" class="space-y-4">
                        <div>
                            <label for="user-type" class="block text-sm font-medium mb-1 text-[#94a3b8]">Type</label>
                            <select id="user-type" required class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 input-field">
                                <option value="lost">🔴 I Lost Something</option>
                                <option value="found">🟢 I Found Something</option>
                            </select>
                        </div>
                        <div>
                            <label for="user-category" class="block text-sm font-medium mb-1 text-[#94a3b8]">Category</label>
                            <select id="user-category" required class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 input-field">
                                <option value="">Select Category</option>
                                <option value="Electronics">📱 Electronics</option>
                                <option value="Stationery">📝 Stationery</option>
                                <option value="Clothing">👕 Clothing</option>
                                <option value="Documents">📄 Documents</option>
                                <option value="Other">📦 Other</option>
                            </select>
                        </div>
                        <div>
                            <label for="user-name" class="block text-sm font-medium mb-1 text-[#94a3b8]">What is it?</label>
                            <input type="text" id="user-name" required placeholder="e.g., Blue Water Bottle" class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 input-field">
                        </div>
                        <div>
                            <label for="user-desc" class="block text-sm font-medium mb-1 text-[#94a3b8]">Description</label>
                            <textarea id="user-desc" required rows="2" class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 resize-none input-field"></textarea>
                        </div>
                        <div>
                            <label for="user-location" class="block text-sm font-medium mb-1 text-[#94a3b8]">Where?</label>
                            <input type="text" id="user-location" required class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 input-field">
                        </div>
                        <div>
                            <label for="user-contact" class="block text-sm font-medium mb-1 text-[#94a3b8]">Your Name</label>
                            <input type="text" id="user-contact" required class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 input-field">
                        </div>
                        <div>
                            <label for="user-phone" class="block text-sm font-medium mb-1 text-[#94a3b8]">Phone Number</label>
                            <input type="tel" id="user-phone" required pattern="[0-9]{10,15}" placeholder="e.g., 09123456789" class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 input-field">
                        </div>
                        <div>
                            <label for="user-date" class="block text-sm font-medium mb-1 text-[#94a3b8]">Date</label>
                            <input type="date" id="user-date" required class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 input-field">
                        </div>
                        <button type="submit" id="user-submit-btn" class="w-full py-3 rounded-lg font-semibold bg-[#22c55e] text-white"> 📝 Post to Board </button>
                    </form>
                </div>
            </div>
        </div>

        <div id="admin-login-overlay" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/60" onclick="closeAdminLogin()"></div>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-md">
                <div class="bg-[#1e293b] rounded-lg p-6">
                    <h2 class="text-lg font-bold mb-4 text-[#f8fafc]">🔐 Admin Login</h2>
                    <form id="admin-login-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1 text-[#94a3b8]">Username</label>
                            <input type="text" id="admin-username" required class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-2 input-field">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1 text-[#94a3b8]">Password</label>
                            <div class="relative">
                                <input type="password" id="admin-password" required class="w-full px-3 py-2 pr-10 rounded-lg border focus:outline-none focus:ring-2 input-field">
                                <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-[#94a3b8] hover:text-[#f8fafc]">
                                    👁️
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="w-full py-3 rounded-lg font-semibold bg-[#f59e0b] text-[#0f172a]">Login</button>
                    </form>
                    <button onclick="closeAdminLogin()" class="mt-4 w-full py-2 rounded-lg font-medium bg-[#334155] text-[#f8fafc]">Cancel</button>
                </div>
            </div>
        </div>

        <div id="comments-overlay" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/60" onclick="closeComments()"></div>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-[#1e293b] rounded-lg shadow-lg max-h-[80vh] overflow-y-auto">
                <div class="sticky top-0 p-4 border-b border-[#334155] flex items-center justify-between bg-[#1e293b] rounded-t-lg">
                    <h2 class="text-lg font-bold text-[#f8fafc]">💬 Comments</h2>
                    <button onclick="closeComments()" class="w-8 h-8 rounded-lg flex items-center justify-center bg-[#334155] text-[#f8fafc] hover:bg-[#475569]">✕</button>
                </div>
                <div class="p-4 space-y-4">
                    <div id="comments-list" class="space-y-3"></div>
                    <form id="comment-form" class="space-y-3">
                        <input type="text" id="comment-author" placeholder="Your name" required class="w-full px-3 py-2 rounded-lg bg-[#334155] border border-[#475569] text-[#f8fafc] placeholder-[#94a3b8] focus:outline-none focus:ring-2 focus:ring-[#f59e0b] focus:border-transparent">
                        <textarea id="comment-text" placeholder="Write a comment..." required rows="3" class="w-full px-3 py-2 rounded-lg bg-[#334155] border border-[#475569] text-[#f8fafc] placeholder-[#94a3b8] focus:outline-none focus:ring-2 focus:ring-[#f59e0b] focus:border-transparent resize-none"></textarea>
                        <button type="submit" class="w-full py-3 rounded-lg font-semibold bg-[#22c55e] text-white hover:bg-[#16a34a] transition-colors">Post Comment</button>
                    </form>
                </div>
            </div>
        </div>

    <script>
        // --- UI state (filters/search) ---
        let currentFilter = 'all';
        let currentCategory = 'all';
        let currentSearch = '';
        let allItems = []; // cached items from the backend

        function togglePostPanel() {
            document.getElementById('post-overlay').classList.toggle('hidden');
        }

        function toggleAdminPanel() {
            document.getElementById('admin-login-overlay').classList.remove('hidden');
        }

        function closeAdminLogin() {
            document.getElementById('admin-login-overlay').classList.add('hidden');
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('admin-password');
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderItems(allItems);
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('bg-[#f59e0b]', btn.dataset.filter === filter);
                btn.classList.toggle('text-[#0f172a]', btn.dataset.filter === filter);
                btn.classList.toggle('bg-[#475569]', btn.dataset.filter !== filter);
                btn.classList.toggle('text-[#e2e8f0]', btn.dataset.filter !== filter);
            });
        }

        function setCategory(category) {
            currentCategory = category;
            renderItems(allItems);
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('bg-[#f59e0b]', btn.dataset.category === category);
                btn.classList.toggle('text-[#0f172a]', btn.dataset.category === category);
                btn.classList.toggle('bg-[#475569]', btn.dataset.category !== category);
                btn.classList.toggle('text-[#e2e8f0]', btn.dataset.category !== category);
            });
        }

        // UPDATED: Uses 'id' instead of '__backendId'
        async function claimItem(itemId) {
    const isConfirmed = confirm("Are you sure you want to claim this item?");
    if (!isConfirmed) return;

    // Call the SDK to update the status to 'claimed'
    const result = await window.dataSdk.update({ id: itemId, status: 'claimed' });
    
    if (result) {
        alert("Item successfully claimed!");
        // The UI will auto-update if your real-time listener in data_sdk.js is active
    } else {
        alert("Failed to claim item. Please try again.");
    }
}

        async function addComment(itemId) {
            const authorInput = document.getElementById('comment-author');
            const textInput = document.getElementById('comment-text');

            const author = authorInput.value.trim();
            const text = textInput.value.trim();

            if (!author || !text) return;

            // Gamitin ang bagong SDK function
            const result = await window.dataSdk.createComment(itemId, author, text);

            if (result) {
                textInput.value = ''; // Clear text box
                // I-refresh ang listahan para makita agad ang bagong comment
                await showComments(itemId); 
            } else {
                alert("Hindi na-save ang comment. Subukan muli.");
            }
        }

        async function showComments(itemId) {
            const comments = await window.dataSdk.fetchComments(itemId);
            // Group comments by parent_comment_id
            const topLevel = comments.filter(c => !c.parent_comment_id);
            const replies = comments.filter(c => c.parent_comment_id);
            function renderReplies(parentId) {
                return replies.filter(r => r.parent_comment_id === parentId).map(r => `
                    <div class="bg-[#475569] p-2 rounded-lg ml-4 mt-2">
                        <p class="font-bold text-xs text-[#f8fafc]">${r.author}</p>
                        <p class="text-xs text-gray-300">${r.text}</p>
                        <p class="text-[10px] text-gray-500">${new Date(r.created_at).toLocaleString()}</p>
                    </div>
                `).join('');
            }
            const commentsList = document.getElementById('comments-list');
            commentsList.innerHTML = topLevel.length > 0 
                ? `<div class="scroll-comments" style="max-height: 250px; overflow-y: auto;">${topLevel.map(c => `
            <div class="bg-[#334155] p-3 rounded-lg mb-2">
                <p class="font-bold text-sm text-white">${c.author}</p>
                <p class="text-sm text-gray-300">${c.text}</p>
                <p class="text-[10px] text-gray-500">${new Date(c.created_at).toLocaleString()}</p>
                <button class="reply-btn bg-[#475569] text-[#e2e8f0] px-2 py-1 rounded mt-2" onclick="showReplyForm('${c.id}')">Reply</button>
                <div id="reply-form-${c.id}" class="hidden mt-2">
                    <input type="text" id="reply-author-${c.id}" placeholder="Your name" class="w-full px-2 py-1 rounded bg-[#334155] border border-[#475569] text-[#f8fafc] mb-1">
                    <textarea id="reply-text-${c.id}" placeholder="Write a reply..." rows="2" class="w-full px-2 py-1 rounded bg-[#334155] border border-[#475569] text-[#f8fafc] mb-1"></textarea>
                    <button class="bg-[#22c55e] text-white px-2 py-1 rounded" onclick="addReply('${itemId}','${c.id}')">Post Reply</button>
                </div>
                ${renderReplies(c.id)}
            </div>
        `).join('')}</div>`
                : '<p class="text-center text-gray-400 py-4">No comments yet.</p>';
            document.getElementById('comments-overlay').classList.remove('hidden');
            document.getElementById('comment-form').dataset.itemId = itemId;
        }

        function closeComments() {
            document.getElementById('comments-overlay').classList.add('hidden');
        }

        function renderItems(items) {
    const grid = document.getElementById('items-grid');
    const emptyState = document.getElementById('empty-state');
    const loadingState = document.getElementById('loading-state');

    loadingState.classList.add('hidden');

    let filteredItems = items;

    // 1. Filter by Type/Status
    if (currentFilter !== 'all') {
        if (currentFilter === 'claimed') {
            filteredItems = filteredItems.filter(item => item.status === 'claimed');
        } else {
            filteredItems = filteredItems.filter(item => item.type === currentFilter && item.status !== 'claimed');
        }
    }

    // 2. Filter by Category
    if (currentCategory !== 'all') {
        filteredItems = filteredItems.filter(item => item.category === currentCategory);
    }

    // 3. Filter by Search
    if (currentSearch.trim() !== '') {
        const searchTerm = currentSearch.toLowerCase();
        filteredItems = filteredItems.filter(item => 
            item.name.toLowerCase().includes(searchTerm) ||
            item.description.toLowerCase().includes(searchTerm) ||
            item.location.toLowerCase().includes(searchTerm)
        );
    }

    document.getElementById('total-count').textContent = items.length;
    document.getElementById('lost-count').textContent = items.filter(i => i.type === 'lost' && i.status !== 'claimed').length;
    document.getElementById('found-count').textContent = items.filter(i => i.type === 'found' && i.status !== 'claimed').length;

    if (filteredItems.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
    } else {
        emptyState.classList.add('hidden');
        grid.innerHTML = filteredItems.map(item => `
            <div class="rounded-xl p-4 bg-[#334155] border border-transparent hover:border-[#f59e0b] transition-all duration-300">
                <div class="flex items-start justify-between mb-2">
                    <h3 class="font-semibold text-[#f8fafc] line-clamp-1">${item.name}</h3>
                    <span class="text-[10px] uppercase font-bold px-2 py-1 rounded-md ${item.type === 'lost' ? 'bg-[#ef4444]/20 text-[#ef4444]' : 'bg-[#22c55e]/20 text-[#22c55e]'}">
                        ${item.type}
                    </span>
                </div>
                <p class="text-sm text-[#94a3b8] mb-4 line-clamp-2 h-10">${item.description}</p>
                <div class="space-y-1 text-xs text-[#64748b] mb-4">
                    <p class="flex items-center gap-1">📍 <span>${item.location}</span></p>
                    <p class="flex items-center gap-1">📅 <span>${new Date(item.date).toLocaleDateString()}</span></p>
                    <p class="flex items-center gap-1">📦 <span class="capitalize">${item.category || 'Other'}</span></p>
                </div>
                <button onclick="showComments('${item.id}')" class="w-full py-2 mb-2 rounded-lg font-medium bg-[#475569] text-[#e2e8f0] hover:bg-[#6b7280] active:scale-95 transition-all">💬 See comments</button>
                ${item.status === 'claimed' 
                    ? `<button disabled class=\"w-full py-2 rounded-lg font-medium bg-gray-500 text-white cursor-not-allowed\">✅ This item is claimed</button>`
                    : `<button onclick=\"claimItem('${item.id}')\" class=\"w-full py-2 rounded-lg font-medium bg-[#f59e0b] text-[#0f172a] hover:scale-95 transition-all\">Claim Item</button>`}
            </div>
        `).join('');
    }
        }

        // After rendering items, update comments count for each item
        (async () => {
            // Define filteredItems in this scope
            let filteredItemsLocal = items;
            if (currentFilter !== 'all') {
                if (currentFilter === 'claimed') {
                    filteredItemsLocal = filteredItemsLocal.filter(item => item.status === 'claimed');
                } else {
                    filteredItemsLocal = filteredItemsLocal.filter(item => item.type === currentFilter && item.status !== 'claimed');
                }
            }
            if (currentCategory !== 'all') {
                filteredItemsLocal = filteredItemsLocal.filter(item => item.category === currentCategory);
            }
            if (currentSearch.trim() !== '') {
                const searchTerm = currentSearch.toLowerCase();
                filteredItemsLocal = filteredItemsLocal.filter(item => 
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.description.toLowerCase().includes(searchTerm) ||
                    item.location.toLowerCase().includes(searchTerm)
                );
            }
            for (const item of filteredItemsLocal) {
                let comments = await window.dataSdk.fetchComments(item.id);
                if (!comments) comments = [];
                if (!Array.isArray(comments)) {
                    if (typeof comments === 'object' && 'data' in comments && Array.isArray(comments.data)) {
                        comments = comments.data;
                    } else {
                        comments = [];
                    }
                }
                const numSpan = document.getElementById(`comments-num-${item.id}`);
                if (numSpan) numSpan.textContent = comments.length;
            }
        })();

        document.getElementById('user-post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('user-submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Posting...';

            const newItem = {
                type: document.getElementById('user-type').value,
                category: document.getElementById('user-category').value,
                name: document.getElementById('user-name').value,
                description: document.getElementById('user-desc').value,
                location: document.getElementById('user-location').value,
                contact: document.getElementById('user-contact').value,
                phone: document.getElementById('user-phone').value,
                date: document.getElementById('user-date').value,
                status: 'posted'
            };

            await window.dataSdk.create(newItem);
            togglePostPanel();
            submitBtn.disabled = false;
            submitBtn.textContent = '📝 Post to Board';
        });

        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;
            if (username === 'LSHSadmin' && password === 'LSHSAdmin2024') {
                closeAdminLogin();
                window.location.href = 'adminPanel.html';
            } else {
                alert('Invalid credentials');
            }
        });

        document.getElementById('comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const itemId = e.target.dataset.itemId;
            await addComment(itemId);
        });

        window.showReplyForm = function(commentId) {
            const form = document.getElementById(`reply-form-${commentId}`);
            if (form) form.classList.toggle('hidden');
        };

        window.addReply = async function(itemId, parentCommentId) {
            const authorInput = document.getElementById(`reply-author-${parentCommentId}`);
            const textInput = document.getElementById(`reply-text-${parentCommentId}`);
            const author = authorInput.value.trim();
            const text = textInput.value.trim();
            if (!author || !text) return;
            // Save reply as a comment with parent_comment_id
            const result = await window.dataSdk.createComment(itemId, author, text, parentCommentId);
            if (result) {
                authorInput.value = '';
                textInput.value = '';
                await showComments(itemId);
            } else {
                alert('Hindi na-save ang reply. Subukan muli.');
            }
        };

        window.addEventListener('DOMContentLoaded', async () => {
            await window.dataSdk.init({
                onDataChanged: (data) => {
                    allItems = data;
                    renderItems(data);
                }
            });

            document.getElementById('user-search').addEventListener('input', (e) => {
                currentSearch = e.target.value;
                renderItems(allItems);
            });
        });
    </script>
</body>
</html>
