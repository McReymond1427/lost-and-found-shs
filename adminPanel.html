<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Lost and Found Board</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>  
    <link rel="stylesheet" href="adminPanel.css">
    <script src="_sdk/data_sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        window.showReplyForm = function(commentId) {
            const form = document.getElementById(`reply-form-${commentId}`);
            if (form) form.classList.toggle('hidden');
        };

        window.addReply = async function(itemId, parentCommentId) {
            const authorInput = document.getElementById(`reply-author-${parentCommentId}`);
            const textInput = document.getElementById(`reply-text-${parentCommentId}`);
            let author = authorInput ? authorInput.value.trim() : '';
            const text = textInput ? textInput.value.trim() : '';
            if (!author) author = 'Admin';
            if (!text) return;
            const result = await window.dataSdk.createComment(itemId, author, text, parentCommentId);
            if (result) {
                textInput.value = '';
                if (authorInput) authorInput.value = 'Admin';
                await window.showComments(itemId);
            } else {
                alert('Failed to post reply. Please try again.');
            }
        };
    </script>
</script>
<script>
    
    let allAdminItems = [];
    let currentFilter = 'all';
    let currentCategory = 'all';
    let currentSearch = '';

    
    function togglePostPanel() {
        document.getElementById('post-overlay').classList.toggle('hidden');
    }

    function toggleAdminPanel() {
        document.getElementById('admin-login-overlay').classList.remove('hidden');
    }

    function closeAdminLogin() {
        document.getElementById('admin-login-overlay').classList.add('hidden');
    }

    function closeComments() {
        document.getElementById('comments-overlay').classList.add('hidden');
    }

    
    window.showComments = async function(itemId) {
        // Hanapin ang item sa array
        const item = allAdminItems.find(i => String(i.id) === String(itemId));
        if (!item) {
            console.error("Item not found in Admin list:", itemId);
            return;
        }
        // I-fill ang Modal Details (The "Post" Part)
        document.getElementById('modal-item-name').textContent = item.name;
        document.getElementById('modal-item-category').textContent = `📂 Category: ${item.category}`;
        document.getElementById('modal-item-desc').textContent = item.description;
        document.getElementById('modal-item-loc').textContent = item.location;
        document.getElementById('modal-item-date').textContent = new Date(item.date).toLocaleDateString();
        document.getElementById('modal-item-contact').textContent = item.contact;
        document.getElementById('modal-item-phone').textContent = item.phone;
        document.getElementById('modal-item-phone').href = `tel:${item.phone}`;
        const badge = document.getElementById('modal-status-badge');
        badge.className = `text-[10px] uppercase font-bold px-2 py-1 rounded ${item.type === 'lost' ? 'bg-red-400/20 text-red-400' : 'bg-green-400/20 text-green-400'}`;
        badge.textContent = item.type;
        // Buksan na ang Modal
        document.getElementById('comments-overlay').classList.remove('hidden');
        document.getElementById('comment-form').dataset.itemId = itemId;
        // Set default value and placeholder for author
        const authorInput = document.getElementById('comment-author');
        authorInput.value = 'Admin';
        authorInput.setAttribute('value', 'Admin');
        await refreshCommentsList(itemId);
    }

    // 1. Refresh comments list and render threads
    async function refreshCommentsList(itemId) {
        const commentsList = document.getElementById('comments-list');
        commentsList.innerHTML = '<p class="text-center text-gray-500 text-xs">Loading conversation...</p>';
        try {
            const allComments = await window.dataSdk.fetchComments(itemId) || [];
            if (allComments.length === 0) {
                commentsList.innerHTML = '<p class="text-center text-gray-500 py-4 italic text-xs">No comments yet.</p>';
                return;
            }
            function renderCommentThread(commentId = null, level = 0) {
                const children = allComments.filter(c => 
                    commentId === null ? !c.parent_comment_id : String(c.parent_comment_id) === String(commentId)
                );
                if (children.length === 0) return '';
                return children.map(c => `
                    <div class="${level > 0 ? 'ml-6 border-l-2 border-[#334155] pl-3 mt-2' : 'mt-4'}">
                        <div class="bg-[#334155] p-3 rounded-2xl border border-[#475569]/50 shadow-sm transition-all hover:border-[#f59e0b]/30">
                            <p class="font-bold text-[12px] ${level % 2 === 0 ? 'text-[#f59e0b]' : 'text-[#22c55e]'}">${c.author}</p>
                            <p class="text-sm text-gray-200 mt-0.5">${c.text}</p>
                            <div class="flex items-center gap-4 mt-2">
                                <span class="text-[9px] text-gray-500">${new Date(c.created_at).toLocaleString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                <button onclick="toggleReplyForm('${c.id}')" class="text-[10px] font-bold text-gray-400 hover:text-[#f59e0b]">Reply</button>
                            </div>
                        </div>
                        <div id="reply-box-${c.id}" class="hidden mt-2 p-2 bg-[#0f172a]/50 rounded-xl border border-[#334155]">
                            <input type="text" id="reply-author-${c.id}" placeholder="Your Name" class="w-full mb-1 px-3 py-1 text-[11px] rounded bg-[#334155] text-white border-none focus:ring-1 focus:ring-[#f59e0b]">
                            <div class="flex gap-2">
                                <textarea id="reply-text-${c.id}" placeholder="Write a reply..." rows="1" class="flex-1 px-3 py-1 text-xs rounded bg-[#334155] text-white border-none focus:ring-1 focus:ring-[#f59e0b] resize-none"></textarea>
                                <button onclick="submitReply('${itemId}', '${c.id}')" class="px-3 py-1 bg-[#f59e0b] text-[#0f172a] rounded-lg text-[10px] font-bold">Post</button>
                            </div>
                        </div>
                        <div class="replies-container">${renderCommentThread(c.id, level + 1)}</div>
                    </div>
                `).join('');
            }
            commentsList.innerHTML = renderCommentThread(null);
        } catch (err) {
            console.error("Rendering Error:", err);
            commentsList.innerHTML = '<p class="text-center text-red-400">Error loading comments.</p>';
        }
    }

    // 2. Show/hide reply box
    window.toggleReplyForm = function(commentId) {
        const replyBox = document.getElementById(`reply-box-${commentId}`);
        document.querySelectorAll('[id^="reply-box-"]').forEach(box => {
            if (box.id !== `reply-box-${commentId}`) box.classList.add('hidden');
        });
        replyBox.classList.toggle('hidden');
        if (!replyBox.classList.contains('hidden')) {
            const authorInput = document.getElementById(`reply-author-${commentId}`);
            authorInput.value = 'Admin';
            authorInput.setAttribute('value', 'Admin');
            authorInput.focus();
        }
    };

    // 3. Submit reply to a comment
    window.submitReply = async function(itemId, parentId) {
        const author = document.getElementById(`reply-author-${parentId}`).value.trim();
        const text = document.getElementById(`reply-text-${parentId}`).value.trim();
        const btn = event.target;
        if (!author || !text) {
            alert("Please fill in both name and reply.");
            return;
        }
        btn.disabled = true;
        btn.textContent = "...";
        const result = await window.dataSdk.createComment(itemId, author, text, parentId);
        if (result) {
            await refreshCommentsList(itemId);
        } else {
            alert("Failed to post reply.");
            btn.disabled = false;
            btn.textContent = "Reply";
        }
    };
</script>
</head>

<body class="h-full bg-[#0f172a] text-[#f8fafc]">

                    </div>

                <!-- Category Filters -->
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <button onclick="setAdminCategory('all')" data-category="all" class="admin-category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#f59e0b] text-[#0f172a]"> All Categories </button>
                    <button onclick="setAdminCategory('Electronics')" data-category="Electronics" class="admin-category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 📱 Electronics </button>
                    <button onclick="setAdminCategory('Stationery')" data-category="Stationery" class="admin-category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 📝 Stationery </button>
                    <button onclick="setAdminCategory('Clothing')" data-category="Clothing" class="admin-category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 👕 Clothing </button>
                    <button onclick="setAdminCategory('Documents')" data-category="Documents" class="admin-category-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 📄 Documents </button>

            <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
                <button onclick="setAdminFilter('all')" data-filter="all" class="admin-filter-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#f59e0b] text-[#0f172a]"> All Items </button>
                <button onclick="setAdminFilter('lost')" data-filter="lost" class="admin-filter-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 🔴 Lost </button>
                <button onclick="setAdminFilter('found')" data-filter="found" class="admin-filter-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> 🟢 Found </button>
                <button onclick="setAdminFilter('claimed')" data-filter="claimed" class="admin-filter-btn px-4 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-all bg-[#475569] text-[#e2e8f0]"> ✅ Claimed </button>
            </div>

            <div id="admin-items-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>

            <div id="admin-empty-state" class="hidden text-center py-16">
                <div class="text-6xl mb-4">📭</div>
                <h3 class="text-xl font-semibold mb-2 text-[#f8fafc]">No items</h3>
                <p class="text-[#94a3b8]">No items to manage</p>

        </main>
    </div>

    <div id="comments-overlay" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeComments()"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl bg-[#1e293b] rounded-2xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div class="p-4 border-b border-[#334155] flex justify-between items-center bg-[#1e293b] sticky top-0 z-10">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <span id="modal-status-badge"></span> 
                    Item Details
                </h2>
                <button onclick="closeComments()" class="w-10 h-10 rounded-full flex items-center justify-center bg-[#334155] text-white hover:bg-red-500 transition-colors">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="bg-[#334155] rounded-xl p-5 border border-[#475569]">
                    <div class="mb-4">
                        <h1 id="modal-item-name" class="text-2xl font-bold text-[#f59e0b] mb-1"></h1>
                        <p id="modal-item-category" class="text-sm text-gray-400 font-medium"></p>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm bg-[#1e293b]/50 p-4 rounded-lg">
                        <div class="space-y-2">
                            <p class="text-gray-400">📍 Location: <span id="modal-item-loc" class="text-white font-semibold"></span></p>
                            <p class="text-gray-400">📅 Date: <span id="modal-item-date" class="text-white font-semibold"></span></p>
                        </div>
                        <div class="space-y-2 border-t md:border-t-0 md:border-l border-[#475569] pt-2 md:pt-0 md:pl-4">
                            <p class="text-gray-400">👤 Posted by: <span id="modal-item-contact" class="text-white font-semibold"></span></p>
                            <p class="text-gray-400">📞 Contact: <a id="modal-item-phone" href="#" class="text-[#22c55e] hover:underline font-bold"></a></p>
                        </div>
                    </div>

                    <h3 class="text-lg font-bold text-white flex items-center gap-2">💬 Discussion</h3>

                    <form id="comment-form" class="bg-[#334155] p-4 rounded-xl border border-[#475569] space-y-3">
                        <input type="text" id="comment-author" placeholder="Your Name" required class="w-full px-4 py-2 rounded-lg bg-[#1e293b] text-white border border-[#475569] focus:ring-2 focus:ring-[#f59e0b] outline-none">
                        <textarea id="comment-text" placeholder="Write a comment..." required rows="2" class="w-full px-4 py-2 rounded-lg bg-[#1e293b] text-white border border-[#475569] focus:ring-2 focus:ring-[#f59e0b] outline-none resize-none"></textarea>
                        <button type="submit" class="w-full py-2 rounded-lg font-bold bg-[#22c55e] text-white hover:bg-[#16a34a] transition-all">Post Comment</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Admin UI state (filters/search) ---
        let currentAdminFilter = 'all';
        let currentAdminCategory = 'all';
        let currentAdminSearch = '';
        

        function setAdminFilter(filter) {
            currentAdminFilter = filter;
            renderAdminItems(allAdminItems);
            document.querySelectorAll('.admin-filter-btn').forEach(btn => {
                btn.classList.toggle('bg-[#f59e0b]', btn.dataset.filter === filter);
                btn.classList.toggle('text-[#0f172a]', btn.dataset.filter === filter);
                btn.classList.toggle('bg-[#475569]', btn.dataset.filter !== filter);
                btn.classList.toggle('text-[#e2e8f0]', btn.dataset.filter !== filter);
            });
        }

        function setAdminCategory(category) {
            currentAdminCategory = category;
            renderAdminItems(allAdminItems);
            document.querySelectorAll('.admin-category-btn').forEach(btn => {
                btn.classList.toggle('bg-[#f59e0b]', btn.dataset.category === category);
                btn.classList.toggle('text-[#0f172a]', btn.dataset.category === category);
                btn.classList.toggle('bg-[#475569]', btn.dataset.category !== category);
                btn.classList.toggle('text-[#e2e8f0]', btn.dataset.category !== category);
            });
        }

        // Add error handling for claim, comment, and delete
        async function claimItem(itemId) {
            try {
                const item = allAdminItems.find(i => i.id === itemId);
                if (!item || item.status === 'claimed') return;
                const btn = document.querySelector(`button[onclick="claimItem('${itemId}')"]`);
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = 'Claiming...';
                }
                const updatedItem = { ...item, status: 'claimed' };
                const result = await window.dataSdk.update(updatedItem);
                const isClaimed = typeof result === 'object' ? result.isOk : !!result;
                if (!isClaimed) {
                    alert('Failed to claim item. Please try again.');
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = '✅ Claim Item';
                    }
                }
            } catch (err) {
                alert('Error claiming item.');
            }
        }

        async function addComment(itemId) {
            try {
                const authorInput = document.getElementById('comment-author');
                const textInput = document.getElementById('comment-text');
                const author = authorInput.value.trim();
                const text = textInput.value.trim();
                if (!author || !text) return;
                const result = await window.dataSdk.createComment(itemId, author, text);
                const isCommented = typeof result === 'object' ? !!result : !!result;
                if (isCommented) {
                    textInput.value = '';
                    await showComments(itemId);
                } else {
                    alert('Hindi na-save ang comment. Subukan muli.');
                }
            } catch (err) {
                alert('Error posting comment.');
            }
        }

        async function deleteItem(itemId) {
    if (!itemId) {
        console.error("Walang ID na nakuha.");
        return;
    }

    if (confirm("Sigurado ka bang gusto mong burahin ang item na ito?")) {
        try {
            // Siguraduhin na window.dataSdk.delete ang tinatawag
            const result = await window.dataSdk.delete(itemId);
            
            // I-check kung ang result ay object at may isOk property
            const success = (result && typeof result === 'object') ? result.isOk : result === true;

            if (success) {
                alert("Item successfully removed.");
                // Ang real-time subscription (onDataChanged) ang bahalang mag-update ng UI
            } else {
                console.error("Supabase Error:", result);
                alert('Failed to delete item. Maaaring may RLS (Row Level Security) restriction sa iyong Supabase table.');
            }
        } catch (error) {
            console.error("Delete Error:", error);
            alert("Nagkaroon ng error sa pag-delete.");
        }
    }
}

        async function showComments(itemId) {
            // Hanapin ang item sa array
            const item = allAdminItems.find(i => String(i.id) === String(itemId));
            if (!item) {
                console.error("Item not found in Admin list:", itemId);
                return;
            }
            // I-fill ang Modal Details (The "Post" Part)
            document.getElementById('modal-item-name').textContent = item.name;
            document.getElementById('modal-item-category').textContent = `📂 Category: ${item.category}`;
            document.getElementById('modal-item-desc').textContent = item.description;
            document.getElementById('modal-item-loc').textContent = item.location;
            document.getElementById('modal-item-date').textContent = new Date(item.date).toLocaleDateString();
            document.getElementById('modal-item-contact').textContent = item.contact;
            document.getElementById('modal-item-phone').textContent = item.phone;
            document.getElementById('modal-item-phone').href = `tel:${item.phone}`;
            const badge = document.getElementById('modal-status-badge');
            badge.className = `text-[10px] uppercase font-bold px-2 py-1 rounded ${item.type === 'lost' ? 'bg-red-400/20 text-red-400' : 'bg-green-400/20 text-green-400'}`;
            badge.textContent = item.type;
            // Buksan na ang Modal
            document.getElementById('comments-overlay').classList.remove('hidden');
            document.getElementById('comment-form').dataset.itemId = itemId;
            // Set default value and placeholder for author
            const authorInput = document.getElementById('comment-author');
            authorInput.value = 'Admin';
            authorInput.setAttribute('value', 'Admin');
            await refreshCommentsList(itemId);
        }

        function closeComments() {
            document.getElementById('comments-overlay').classList.add('hidden');
        }

        function renderAdminItems(items) {
    const grid = document.getElementById('admin-items-grid');
    const emptyState = document.getElementById('admin-empty-state');
    const loadingState = document.getElementById('admin-loading-state');

    loadingState.classList.add('hidden');

    let filteredItems = items;

    // Filter by Type/Status
    if (currentAdminFilter !== 'all') {
        if (currentAdminFilter === 'claimed') {
            filteredItems = filteredItems.filter(item => item.status === 'claimed');
        } else {
            // If filtering by Lost or Found, usually you want to hide things already claimed
            filteredItems = filteredItems.filter(item => item.type === currentAdminFilter && item.status !== 'claimed');
        }
    }

    // Filter by Category
    if (currentAdminCategory !== 'all') {
        filteredItems = filteredItems.filter(item => item.category === currentAdminCategory);
    }

    // Filter by Search
    if (currentAdminSearch.trim() !== '') {
        const searchTerm = currentAdminSearch.toLowerCase();
        filteredItems = filteredItems.filter(item => 
            item.name.toLowerCase().includes(searchTerm) ||
            item.description.toLowerCase().includes(searchTerm) ||
            item.location.toLowerCase().includes(searchTerm)
        );
    }

    // Update Dashboard Stats
    document.getElementById('total-count').textContent = items.length;
    document.getElementById('lost-count').textContent = items.filter(i => i.type === 'lost' && i.status !== 'claimed').length;
    document.getElementById('found-count').textContent = items.filter(i => i.type === 'found' && i.status !== 'claimed').length;
    document.getElementById('claimed-count').textContent = items.filter(i => i.status === 'claimed').length;

    if (filteredItems.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        // Update text to show if it's a search result empty state
        emptyState.querySelector('p').textContent = currentAdminSearch ? "No items match your search." : "No items to manage.";
    } else {
        emptyState.classList.add('hidden');
        grid.innerHTML = filteredItems.map(item => `
            <div class="rounded-xl p-4 bg-[#334155] border ${item.type === 'lost' ? 'border-red-500/20' : 'border-transparent'} hover:border-[#f59e0b] transition-all">
                <div class="flex items-start justify-between mb-2">
                    <h3 class="font-semibold text-[#f8fafc] line-clamp-1">${item.name}</h3>
                    <span class="text-[10px] uppercase font-bold px-2 py-1 rounded ${item.type === 'lost' ? 'bg-red-400/20 text-red-400' : 'bg-green-400/20 text-green-400'}">
                        ${item.type}
                    </span>
                </div>
                <p class="text-sm text-[#94a3b8] mb-4 line-clamp-2 h-10">${item.description}</p>
                <div class="space-y-1 text-xs text-[#64748b] mb-4">
                    <p>📍 ${item.location}</p>
                    <p>📅 ${new Date(item.date).toLocaleDateString()}</p>
                </div>
                <button onclick="showComments('${item.id}')" class="w-full py-2 mb-2 rounded-lg font-medium bg-[#475569] text-[#e2e8f0] hover:bg-[#f59e0b] hover:text-[#0f172a] transition-all">
                    🔍 View Post & Comments
                </button>
                ${item.status === 'claimed' 
                    ? `<button disabled class="w-full py-2 rounded-lg font-medium bg-gray-600 text-white cursor-not-allowed">✅ Claimed</button>`
                    : item.type === 'found' 
                        ? `<button onclick="claimItem('${item.id}')"
                            class="w-full py-2 rounded-lg font-medium bg-[#f59e0b] text-[#0f172a] hover:scale-95 transition-all">Claim Item</button>`
                        : `<div class="w-full py-2 text-center text-[10px] font-bold uppercase tracking-wider text-red-400 bg-red-400/10 rounded-lg">Status: Still Missing</div>`
                }
            </div>
        `).join('');
    }
        }

        document.getElementById('comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const itemId = e.target.dataset.itemId;
            // Set default name to 'Admin' if empty
            const authorInput = document.getElementById('comment-author');
            let author = authorInput.value.trim();
            if (!author) author = 'Admin';
            const text = document.getElementById('comment-text').value;
            if (!author || !text) return;
            const result = await window.dataSdk.createComment(itemId, author, text);
            if (result) {
                document.getElementById('comment-text').value = '';
                authorInput.value = 'Admin';
                await refreshCommentsList(itemId);
            }
        });

        window.addEventListener('DOMContentLoaded', async () => {
            await window.dataSdk.init({
                onDataChanged: (data) => {
                    allAdminItems = data;
                    renderAdminItems(data);
                }
            });
            document.getElementById('admin-search').addEventListener('input', (e) => {
                currentAdminSearch = e.target.value;
                renderAdminItems(allAdminItems);
            });
        });
    </script>
</body>
</html>
